<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unreal Engine Log Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #2d2d2d; padding: 1rem; border-bottom: 2px solid #3d3d3d; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 0.8rem; padding: 4px 8px; border-radius: 4px; }
        .online { background: #2d5a27; color: #a3e635; }
        .offline { background: #5a2727; color: #e63535; }
        main { flex: 1; overflow-y: auto; padding: 1rem; }
        .log-entry { margin-bottom: 0.5rem; padding: 0.5rem; background: #262626; border-radius: 4px; border-left: 4px solid #666; font-family: 'Consolas', monospace; display: flex; gap: 1rem; animation: slideIn 0.2s ease-out; }
        .log-entry.ERROR { border-left-color: #f44336; background: #3d1515; }
        .log-entry.WARNING { border-left-color: #ffeb3b; background: #3d3d15; }
        .timestamp { color: #888; min-width: 100px; }
        .level { font-weight: bold; min-width: 70px; }
        .message { word-break: break-all; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header>
        <h1>Unreal Engine Log Dashboard</h1>
        <div id="status" class="status offline">OFFLINE</div>
    </header>
    <main id="log-list"></main>
    <script>
        const logList = document.getElementById('log-list');
        const status = document.getElementById('status');
        const socket = new WebSocket('ws://' + window.location.host + '/ws');

        socket.onopen = () => { status.textContent = 'ONLINE'; status.className = 'status online'; };
        socket.onclose = () => { status.textContent = 'OFFLINE'; status.className = 'status offline'; };
        
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + (data.level || 'INFO');
            
            const timeStr = new Date(data.timestamp * 1000).toLocaleTimeString();
            
            entry.innerHTML = `
                <span class="timestamp">${timeStr}</span>
                <span class="level">${data.level}</span>
                <span class="message">${data.message}</span>
            `;
            
            logList.insertBefore(entry, logList.firstChild);
            if (logList.childElementCount > 200) logList.lastChild.remove();
        };
    </script>
</body>
</html>
