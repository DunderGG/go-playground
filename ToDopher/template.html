<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDopher Report</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --text-color: #c9d1d9;
            --border-color: #30363d;
            --heading-color: #f0f6fc;
            --footer-color: #8b949e;
            --table-hover: #21262d;
            --chart-bg: #161b22;
        }

        body.light-mode {
            --bg-color: #f6f8fa;
            --container-bg: #ffffff;
            --text-color: #24292f;
            --border-color: #d0d7de;
            --heading-color: #24292f;
            --footer-color: #6e7781;
            --table-hover: #f6f8fa;
            --chart-bg: #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 2rem; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .container { 
            max-width: 1300px; 
            margin: 0 auto; 
            background: var(--container-bg); 
            padding: 2rem; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            border: 1px solid var(--border-color);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-icon {
            width: 64px;
            height: 64px;
            object-fit: contain;
        }

        h1 { color: var(--heading-color); margin: 0; }

        .chart-container {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-width: 600px;
            height: 300px;
            display: flex;
            justify-content: center;
        }

        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; color: white; display: inline-block; }
        .tag-todo { background-color: #238636; }
        .tag-fixme { background-color: #da3633; }
        .tag-hack { background-color: #d29922; }
        .tag-bug { background-color: #f85149; }
        .tag-default { background-color: #6e7681; }

        .footer { margin-top: 2rem; text-align: center; color: var(--footer-color); font-size: 0.9rem; }

        .filter-row {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 0.9rem;
        }

        /* DataTables Dark Mode Overrides */
        table.dataTable { color: var(--text-color) !important; border-bottom: 1px solid var(--border-color) !important; }
        table.dataTable thead th { border-bottom: 1px solid var(--border-color) !important; color: var(--heading-color); }
        table.dataTable tbody tr { background-color: var(--container-bg) !important; }
        table.dataTable tbody tr:hover { background-color: var(--table-hover) !important; }
        .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter, 
        .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_processing, 
        .dataTables_wrapper .dataTables_paginate { color: var(--text-color) !important; }
        .dataTables_wrapper .dataTables_paginate .paginate_button { color: var(--text-color) !important; border: 1px solid transparent; }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current { background: var(--border-color) !important; border: 1px solid var(--border-color) !important; color: var(--heading-color) !important; }
        .dataTables_wrapper .dataTables_filter input { background-color: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 4px; padding: 4px; }

        /* Toggle Switch */
        .theme-switch-wrapper { display: flex; align-items: center; gap: 10px; }
        .theme-switch { display: inline-block; height: 24px; position: relative; width: 50px; }
        .theme-switch input { display: none; }
        .slider { background-color: #ccc; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: #fff; bottom: 4px; content: ""; height: 16px; left: 4px; position: absolute; transition: .4s; width: 16px; border-radius: 50%; }
        input:checked + .slider { background-color: #238636; }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Context Code Style */
        .context-code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.85rem;
            background: #0d1117;
            padding: 10px;
            border-radius: 4px;
            margin-top: 8px;
            border-left: 3px solid #30363d;
            white-space: pre-wrap;
            color: #8b949e;
        }
        body.light-mode .context-code {
            background: #f6f8fa;
            border-left: 3px solid #d0d7de;
            color: #57606a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="header-title">
                <img src="appicon.png" alt="ToDopher Icon" class="app-icon" onerror="this.style.display='none'">
                <h1>ToDopher Debt Report</h1>
            </div>
            <div class="theme-switch-wrapper">
                <span>Turn the lights on</span>
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider"></div>
                </label>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="tagChart"></canvas>
        </div>

        <div class="filter-row">
            <div class="filter-group">
                <label for="authorFilter">Filter by Author:</label>
                <select id="authorFilter">
                    <option value="">All Authors</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="tagFilter">Filter by Tag:</label>
                <select id="tagFilter">
                    <option value="">All Tags</option>
                </select>
            </div>
        </div>

        <table id="todosTable" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>Tag</th>
                    <th>Author</th>
                    <th>File</th>
                    <th>Line</th>
                    <th>When</th>
                    <th>Content</th>
                </tr>
            </thead>
        </table>
        <div class="footer">Generated by ToDopher - Your Technical Debt Gopher</div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script>
        const findings = {{.FindingsJSON}};
        const toggleSwitch = document.querySelector('#checkbox');

        function switchTheme(e) {
            if (e.target.checked) {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }    
        }

        toggleSwitch.addEventListener('change', switchTheme, false);

        $(document).ready(function() {
            // Extract unique authors and tags for filters
            const authors = [...new Set(findings.map(f => f.author))].filter(a => a).sort();
            const tags = [...new Set(findings.map(f => f.tag))].sort();

            const authorFilter = $('#authorFilter');
            const tagFilter = $('#tagFilter');

            authors.forEach(author => {
                authorFilter.append(`<option value="${author}">${author}</option>`);
            });

            tags.forEach(tag => {
                tagFilter.append(`<option value="${tag}">${tag}</option>`);
            });

            // Prepare Chart Data
            const tagCounts = {};
            findings.forEach(f => {
                tagCounts[f.tag] = (tagCounts[f.tag] || 0) + 1;
            });

            const chartLabels = Object.keys(tagCounts);
            const chartData = Object.values(tagCounts);
            const tagColors = {
                'TODO': '#238636',
                'FIXME': '#da3633',
                'HACK': '#d29922',
                'BUG': '#f85149',
                'SUGGESTION': '#0969da',
                'IDEA': '#db61ad',
                'REWORK': '#8250df'
            };
            const backgroundColors = chartLabels.map(label => tagColors[label] || '#6e7681');

            const ctx = document.getElementById('tagChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: 'Finding Distribution',
                        data: chartData,
                        backgroundColor: backgroundColors,
                        borderColor: '#161b22',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { 
                            display: true,
                            position: 'right',
                            labels: {
                                color: '#c9d1d9',
                                padding: 20,
                                font: { size: 12 }
                            }
                        },
                        title: {
                            display: true,
                            text: 'Technical Debt Distribution',
                            color: '#c9d1d9',
                            font: { size: 16 }
                        }
                    }
                }
            });

            const table = $('#todosTable').DataTable({
                data: findings,
                columns: [
                    { 
                        data: 'tag',
                        render: function(data) {
                            let cls = 'tag-' + data.toLowerCase();
                            return '<span class="tag ' + cls + '">' + data + '</span>';
                        }
                    },
                    { data: 'author', defaultContent: '-' },
                    { data: 'file' },
                    { data: 'line' },
                    { data: 'when', defaultContent: '-' },
                    { 
                        data: 'content',
                        render: function(data, type, row) {
                            let html = `<strong>${data}</strong>`;
                            if (row.context && row.context.length > 0) {
                                html += `<div class="context-code">${row.context.join('\n')}</div>`;
                            }
                            return html;
                        }
                    }
                ],
                order: [[0, 'asc']]
            });

            // Filter logic
            $('#authorFilter').on('change', function() {
                table.column(1).search(this.value).draw();
            });

            $('#tagFilter').on('change', function() {
                table.column(0).search(this.value).draw();
            });
        });
    </script>
</body>
</html>
